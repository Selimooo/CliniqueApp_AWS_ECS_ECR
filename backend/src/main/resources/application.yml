server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://clinicdb.ck9osq26cb8i.us-east-1.rds.amazonaws.com:5432/clinic_db
    #    url: jdbc:postgresql://host.docker.internal:5432/clinic_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
